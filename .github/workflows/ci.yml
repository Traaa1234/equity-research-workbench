name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Cancel in-flight runs for the same ref when a new push comes in.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    # Default env applied to every step (avoids repeating the same secrets block per step).
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DATABASE_URL_SERVICE_ROLE: ${{ secrets.DATABASE_URL_SERVICE_ROLE }}
      DATABASE_URL_TEST: ${{ secrets.DATABASE_URL_TEST }}
      DATABASE_URL_TEST_SERVICE_ROLE: ${{ secrets.DATABASE_URL_TEST_SERVICE_ROLE }}
      NEXT_PUBLIC_STACK_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_STACK_PROJECT_ID }}
      NEXT_PUBLIC_STACK_PUBLISHABLE_CLIENT_KEY: ${{ secrets.NEXT_PUBLIC_STACK_PUBLISHABLE_CLIENT_KEY }}
      STACK_SECRET_SERVER_KEY: ${{ secrets.STACK_SECRET_SERVER_KEY }}
      FINANCIAL_DATASETS_API_KEY: ${{ secrets.FINANCIAL_DATASETS_API_KEY }}
      UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
      UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
      CRON_SECRET: ${{ secrets.CRON_SECRET }}
      PYTHON_BIN: python

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 11.0.9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Python (for yfinance fallback)
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Node deps
        run: pnpm install --frozen-lockfile

      - name: Install Python deps
        run: pip install -r scripts/requirements.txt

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: Integration tests
        run: pnpm test:integration

      - name: Build
        run: pnpm build
